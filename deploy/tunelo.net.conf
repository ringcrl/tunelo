# /etc/nginx/sites-available/tunelo
# Nginx configuration for tunelo.net

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name tunelo.net *.tunelo.net;

    # Let's Encrypt ACME challenge (fallback, usually DNS-01 is used)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main site: tunelo.net ──────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name tunelo.net;

    ssl_certificate     /etc/letsencrypt/live/tunelo.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tunelo.net/privkey.pem;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Serve the landing page
    root /opt/tunelo/website;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Tunnel subdomains: *.tunelo.net → relay:8080 ───────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name *.tunelo.net;

    ssl_certificate     /etc/letsencrypt/live/tunelo.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tunelo.net/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Pass original Host header (critical for tunnel routing!)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long-lived connections
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for streaming
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
