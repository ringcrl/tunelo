name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: tunelo-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: tunelo-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: tunelo-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: tunelo-macos-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          # For aarch64 cross-compilation
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            mkdir -p .cargo
            echo '[target.aarch64-unknown-linux-musl]' >> .cargo/config.toml
            echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml
            echo 'rustflags = ["-C", "target-feature=+crt-static"]' >> .cargo/config.toml
          fi

      - name: Create dummy web/dist for include_dir
        run: mkdir -p web/dist && echo '<html></html>' > web/dist/index.html

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin tunelo

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/tunelo ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x tunelo-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: tunelo-*
          generate_release_notes: true
