name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: tunelo-linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset: tunelo-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: tunelo-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: tunelo-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: tunelo-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup build environment
        if: runner.os != 'Windows'
        run: |
          # Remove local .cargo/config.toml (macOS-specific)
          rm -f .cargo/config.toml
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update
            sudo apt-get install -y musl-tools
            if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
              sudo apt-get install -y gcc-aarch64-linux-gnu
              mkdir -p .cargo
              printf '[target.aarch64-unknown-linux-musl]\nlinker = "aarch64-linux-gnu-gcc"\n' > .cargo/config.toml
            fi
          fi

      - name: Setup build environment (Windows)
        if: runner.os == 'Windows'
        run: Remove-Item -Force -ErrorAction SilentlyContinue .cargo/config.toml
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web frontend
        run: |
          cd web
          npm install -g pnpm
          pnpm install
          pnpm build
        shell: bash

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin tunelo

      - name: Rename binary
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/tunelo ${{ matrix.asset }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item "target/${{ matrix.target }}/release/tunelo.exe" "${{ matrix.asset }}"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x tunelo-*-amd64 tunelo-*-arm64 2>/dev/null || true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: tunelo-*
          generate_release_notes: true
